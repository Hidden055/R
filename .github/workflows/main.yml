name: Test Connection to Iranian Host

on:
  workflow_dispatch:
    inputs:
      host_url:
        description: 'آدرس سایتت رو وارد کن'
        required: true
        default: 'https://yourdomain.com'
      test_type:
        description: 'نوع تست'
        required: true
        type: choice
        options:
          - 'Ping Test'
          - 'HTTP Request'
          - 'Download Test'
          - 'Full Test'

jobs:
  test-connection:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    
    - name: Test Ping
      if: ${{ github.event.inputs.test_type == 'Ping Test' || github.event.inputs.test_type == 'Full Test' }}
      run: |
        echo "🔍 تست پینگ..."
        # استخراج دامنه از URL
        HOST=$(echo "${{ github.event.inputs.host_url }}" | sed -e 's|^[^/]*//||' -e 's|/.*$||')
        echo "پینگ به: $HOST"
        ping -c 4 $HOST || echo "⚠️ پینگ موفق نبود (بعضی سرورها پینگ رو بلاک می‌کنن)"
    
    - name: Test HTTP Connection
      if: ${{ github.event.inputs.test_type == 'HTTP Request' || github.event.inputs.test_type == 'Full Test' }}
      run: |
        echo "🌐 تست اتصال HTTP..."
        curl -I -L --max-time 30 "${{ github.event.inputs.host_url }}" || echo "❌ اتصال HTTP ناموفق"
    
    - name: Test Full Page Load
      if: ${{ github.event.inputs.test_type == 'HTTP Request' || github.event.inputs.test_type == 'Full Test' }}
      run: |
        echo "📄 تست لود کامل صفحه..."
        HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "${{ github.event.inputs.host_url }}")
        if [ "$HTTP_CODE" = "200" ]; then
          echo "✅ صفحه با موفقیت لود شد! (کد $HTTP_CODE)"
        else
          echo "❌ خطا در لود صفحه (کد $HTTP_CODE)"
        fi
    
    - name: Test Download Speed
      if: ${{ github.event.inputs.test_type == 'Download Test' || github.event.inputs.test_type == 'Full Test' }}
      run: |
        echo "📥 تست سرعت دانلود..."
        # یه فایل کوچیک از هاست دانلود کن (مثلاً CSS)
        curl -L -o /tmp/test-file.css --max-time 30 "${{ github.event.inputs.host_url }}/style.css" 2>&1
        
        if [ -f /tmp/test-file.css ] && [ -s /tmp/test-file.css ]; then
          FILE_SIZE=$(wc -c < /tmp/test-file.css)
          echo "✅ فایل با موفقیت دانلود شد! (حجم: $FILE_SIZE بایت)"
        else
          echo "❌ دانلود فایل ناموفق بود"
        fi
    
    - name: Test Video Download (Small)
      if: ${{ github.event.inputs.test_type == 'Download Test' || github.event.inputs.test_type == 'Full Test' }}
      run: |
        echo "🎬 تست دانلود فایل از پوشه videos..."
        
        # اول لیست فایل‌های موجود رو بگیر
        curl -s "${{ github.event.inputs.host_url }}/download.php?action=list" > /tmp/videos-list.json
        
        if [ -s /tmp/videos-list.json ]; then
          echo "📋 لیست فایل‌های موجود:"
          cat /tmp/videos-list.json | python3 -m json.tool 2>/dev/null || cat /tmp/videos-list.json
          
          # اگه فایلی هست، اولین فایل رو دانلود کن (فقط ۵ مگابایت اول)
          FIRST_FILE=$(python3 -c "
import json, sys
try:
    data = json.load(open('/tmp/videos-list.json'))
    if data:
        print(data[0]['url'])
except:
    pass
" 2>/dev/null)
          
          if [ ! -z "$FIRST_FILE" ]; then
            echo "📥 در حال دانلود نمونه: ${{ github.event.inputs.host_url }}/$FIRST_FILE"
            curl -L -o /tmp/test-video.mp4 --max-time 60 --max-filesize 5242880 "${{ github.event.inputs.host_url }}/$FIRST_FILE"
            
            if [ -f /tmp/test-video.mp4 ] && [ -s /tmp/test-video.mp4 ]; then
              VIDEO_SIZE=$(wc -c < /tmp/test-video.mp4)
              echo "✅ بخشی از ویدیو دانلود شد! (حجم: $(($VIDEO_SIZE / 1024)) کیلوبایت)"
            else
              echo "❌ دانلود ویدیو ناموفق بود"
            fi
          else
            echo "ℹ️ هیچ ویدیویی برای تست وجود نداره"
          fi
        else
          echo "❌ API لیست فایل‌ها پاسخ نداد"
        fi
    
    - name: Network Diagnostics
      if: ${{ github.event.inputs.test_type == 'Full Test' }}
      run: |
        echo "🔬 عیب‌یابی شبکه..."
        
        # تست DNS
        HOST=$(echo "${{ github.event.inputs.host_url }}" | sed -e 's|^[^/]*//||' -e 's|/.*$||')
        echo "🔍 تست DNS برای: $HOST"
        nslookup $HOST || dig $HOST || echo "DNS resolution failed"
        
        # تست Traceroute
        echo "🗺️ مسیریابی شبکه:"
        traceroute -m 15 $HOST 2>&1 || echo "Traceroute not available"
        
        # تست پورت‌های مختلف
        echo "🔌 تست پورت‌های رایج:"
        for port in 80 443 8080 8443; do
          timeout 5 bash -c "echo >/dev/tcp/$HOST/$port" 2>/dev/null && echo "✅ پورت $port بازه" || echo "❌ پورت $port بسته است"
        done
    
    - name: Final Report
      run: |
        echo "📊 گزارش نهایی اتصال از گیت‌هاب به هاست ایران"
        echo "================================================"
        echo "⏰ زمان تست: $(date -u)"
        echo "🌍 موقعیت: دیتاسنتر گیت‌هاب (معمولاً آمریکا/اروپا)"
        echo "🎯 هدف: ${{ github.event.inputs.host_url }}"
        echo "📝 نوع تست: ${{ github.event.inputs.test_type }}"
